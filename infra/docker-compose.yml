services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: gushen-postgres
    environment:
      POSTGRES_DB: gushen
      POSTGRES_USER: gushen
      POSTGRES_PASSWORD: gushen_dev_password
    ports:
      - "5432:5432"
    volumes:
      - gushen_postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

volumes:
  gushen_postgres_data:

